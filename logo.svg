<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo SOBRA NADA APP">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DE85B"/>
      <stop offset="100%" stop-color="#34A827"/>
    </linearGradient>
    <style>
      .word{ font-family: "Arial Black", "Helvetica", sans-serif; font-weight:900;
             font-style:italic; letter-spacing:-3px; }
    </style>
  </defs>

  <!-- paint drips (graffiti vibe) -->
  <g fill="#2C8C20">
    <path d="M150 168 q6 30 0 52 q-8 14 -14 0 q-5 -18 0 -52 Z"/>
    <path d="M470 168 q5 40 0 64 q-7 14 -12 0 q-5 -22 0 -64 Z"/>
    <circle cx="143" cy="226" r="8"/>
    <circle cx="464" cy="238" r="8"/>
  </g>
  <g fill="#2C8C20">
    <path d="M250 300 q6 26 0 44 q-8 12 -13 0 q-5 -16 0 -44 Z"/>
    <circle cx="243" cy="348" r="7"/>
  </g>

  <!-- SOBRA -->
  <text x="60" y="160" class="word" font-size="120"
        fill="url(#ink)" stroke="#16520f" stroke-width="9"
        paint-order="stroke" stroke-linejoin="round">SOBRA</text>
  <!-- highlight pass -->
  <text x="60" y="160" class="word" font-size="120" fill="#A9F58E" opacity="0.25">SOBRA</text>

  <!-- NADA -->
  <text x="100" y="290" class="word" font-size="120"
        fill="url(#ink)" stroke="#16520f" stroke-width="9"
        paint-order="stroke" stroke-linejoin="round">NADA</text>
  <text x="100" y="290" class="word" font-size="120" fill="#A9F58E" opacity="0.25">NADA</text>

  <!-- APP tag -->
  <g transform="rotate(-6 600 250)">
    <rect x="540" y="222" width="118" height="54" rx="10" fill="#16520f"/>
    <text x="599" y="262" text-anchor="middle"
          font-family="Arial Black, sans-serif" font-weight="900" font-style="italic"
          font-size="40" fill="#7DE85B" letter-spacing="2">APP</text>
  </g>
</svg>
