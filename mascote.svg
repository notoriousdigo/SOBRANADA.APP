<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mascote Porquinho SOBRA NADA APP">
  <defs>
    <radialGradient id="bodyGrad" cx="42%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#7DE85B"/>
      <stop offset="55%" stop-color="#46C932"/>
      <stop offset="100%" stop-color="#2E9E22"/>
    </radialGradient>
    <linearGradient id="snoutGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5FD945"/>
      <stop offset="100%" stop-color="#37A82A"/>
    </linearGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9BF07E" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9BF07E" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0c3d08" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- shadow on ground -->
  <ellipse cx="256" cy="470" rx="150" ry="26" fill="#0c3d08" opacity="0.25"/>

  <g filter="url(#soft)">
    <!-- ears -->
    <path d="M150 120 C120 70 95 60 92 95 C90 125 120 150 158 158 Z" fill="#39B02B"/>
    <path d="M362 120 C392 70 417 60 420 95 C422 125 392 150 354 158 Z" fill="#39B02B"/>
    <path d="M150 122 C128 86 112 80 110 102 C109 122 130 140 156 146 Z" fill="#2C8C20"/>
    <path d="M362 122 C384 86 400 80 402 102 C403 122 382 140 356 146 Z" fill="#2C8C20"/>

    <!-- big fat body/head as one round blob -->
    <path d="M256 92
             C372 92 446 168 446 280
             C446 392 366 446 256 446
             C146 446 66 392 66 280
             C66 168 140 92 256 92 Z" fill="url(#bodyGrad)"/>

    <!-- cheeks blush -->
    <ellipse cx="150" cy="300" rx="46" ry="34" fill="url(#cheek)"/>
    <ellipse cx="362" cy="300" rx="46" ry="34" fill="url(#cheek)"/>

    <!-- angry eyebrows -->
    <path d="M150 196 L242 234 L236 252 L146 218 Z" fill="#16520f"/>
    <path d="M362 196 L270 234 L276 252 L366 218 Z" fill="#16520f"/>

    <!-- eyes (squinty / angry) -->
    <g>
      <ellipse cx="198" cy="258" rx="34" ry="30" fill="#ffffff"/>
      <ellipse cx="314" cy="258" rx="34" ry="30" fill="#ffffff"/>
      <!-- upper lids pressing down for grumpy look -->
      <path d="M164 250 Q198 232 232 250 L232 240 Q198 224 164 240 Z" fill="#1f6e16"/>
      <path d="M280 250 Q314 232 348 250 L348 240 Q314 224 280 240 Z" fill="#1f6e16"/>
      <circle cx="206" cy="266" r="13" fill="#10310c"/>
      <circle cx="306" cy="266" r="13" fill="#10310c"/>
      <circle cx="210" cy="262" r="4" fill="#ffffff"/>
      <circle cx="310" cy="262" r="4" fill="#ffffff"/>
    </g>

    <!-- snout -->
    <ellipse cx="256" cy="330" rx="74" ry="52" fill="url(#snoutGrad)" stroke="#2C8C20" stroke-width="4"/>
    <ellipse cx="230" cy="332" rx="15" ry="22" fill="#16520f"/>
    <ellipse cx="282" cy="332" rx="15" ry="22" fill="#16520f"/>

    <!-- grumpy mouth -->
    <path d="M196 392 Q256 366 316 392" fill="none" stroke="#16520f" stroke-width="9" stroke-linecap="round"/>

    <!-- little arms crossed (attitude) -->
    <path d="M120 388 Q170 360 235 392 Q175 410 120 408 Z" fill="#3CB52E"/>
    <path d="M392 388 Q342 360 277 392 Q337 410 392 408 Z" fill="#3CB52E"/>

    <!-- tiny angry steam puffs -->
    <path d="M96 150 q-14 -6 -6 -20 q-14 4 -14 -10" fill="none" stroke="#8AE96B" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <path d="M420 150 q14 -6 6 -20 q14 4 14 -10" fill="none" stroke="#8AE96B" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
